<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses — Student Management System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Courses</h2>
      <p>Manage academic courses and enrollments</p>
    </div>
    <div class="topbar-right">
      <span class="date-badge" id="liveDate"></span>
      <button class="btn btn-primary" onclick="openModal('addCourseModal')">+ Add Course</button>
    </div>
  </div>

  <div class="page-body">
    <div class="card">
      <div class="card-header">
        <h3>All Courses <span id="courseCount" style="font-size:13px;font-weight:400;color:#8a97a8;font-family:'DM Sans',sans-serif;"></span></h3>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Code</th>
              <th>Course Name</th>
              <th>Instructor</th>
              <th>Department</th>
              <th>Sem</th>
              <th>Credit Hrs</th>
              <th>Enrollment</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="coursesTable">
            <tr><td colspan="9" style="text-align:center;padding:30px;color:#8a97a8;">Loading courses…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Course Modal -->
<div class="modal-overlay" id="addCourseModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add New Course</h3>
      <button class="modal-close" onclick="closeModal('addCourseModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Course Code *</label>
          <input type="text" id="ac-code" placeholder="e.g. CSC-101">
        </div>
        <div class="form-group">
          <label>Course Name *</label>
          <input type="text" id="ac-name" placeholder="e.g. Data Structures">
        </div>
        <div class="form-group">
          <label>Instructor *</label>
          <input type="text" id="ac-instructor" placeholder="e.g. Dr. Ali Raza">
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="ac-department">
            <option>Computer Science</option>
            <option>Software Engineering</option>
            <option>Information Technology</option>
            <option>General</option>
          </select>
        </div>
        <div class="form-group">
          <label>Semester</label>
          <select id="ac-semester">
            <option value="1">1st</option><option value="2">2nd</option>
            <option value="3">3rd</option><option value="4">4th</option>
            <option value="5">5th</option><option value="6">6th</option>
            <option value="7">7th</option><option value="8">8th</option>
          </select>
        </div>
        <div class="form-group">
          <label>Credit Hours</label>
          <select id="ac-creditHours">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
          </select>
        </div>
        <div class="form-group">
          <label>Max Students</label>
          <input type="number" id="ac-maxStudents" placeholder="40" value="40">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('addCourseModal')">Cancel</button>
        <button class="btn btn-primary" onclick="addCourse()">Add Course</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Course Modal -->
<div class="modal-overlay" id="editCourseModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Course</h3>
      <button class="modal-close" onclick="closeModal('editCourseModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ec-id">
      <div class="form-grid">
        <div class="form-group">
          <label>Course Code</label>
          <input type="text" id="ec-code">
        </div>
        <div class="form-group">
          <label>Course Name</label>
          <input type="text" id="ec-name">
        </div>
        <div class="form-group">
          <label>Instructor</label>
          <input type="text" id="ec-instructor">
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="ec-department">
            <option>Computer Science</option>
            <option>Software Engineering</option>
            <option>Information Technology</option>
            <option>General</option>
          </select>
        </div>
        <div class="form-group">
          <label>Semester</label>
          <select id="ec-semester">
            <option value="1">1st</option><option value="2">2nd</option>
            <option value="3">3rd</option><option value="4">4th</option>
            <option value="5">5th</option><option value="6">6th</option>
            <option value="7">7th</option><option value="8">8th</option>
          </select>
        </div>
        <div class="form-group">
          <label>Credit Hours</label>
          <select id="ec-creditHours">
            <option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option>
          </select>
        </div>
        <div class="form-group">
          <label>Max Students</label>
          <input type="number" id="ec-maxStudents">
        </div>
        <div class="form-group">
          <label>Enrolled Students</label>
          <input type="number" id="ec-enrolledStudents">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('editCourseModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditCourse()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="/js/shared.js"></script>
<script>
  document.getElementById('sidebar').innerHTML = renderSidebar();
  let allCourses = [];

  async function loadCourses() {
    const res = await apiGet('/api/courses');
    allCourses = res.data;
    renderCourses(allCourses);
  }

  function renderCourses(courses) {
    document.getElementById('courseCount').textContent = `(${courses.length})`;
    const tbody = document.getElementById('coursesTable');
    if (!courses.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">📚</div><h4>No courses found</h4></div></td></tr>`;
      return;
    }
    tbody.innerHTML = courses.map((c, i) => {
      const pct = Math.round((c.enrolledStudents / c.maxStudents) * 100);
      const barColor = pct >= 90 ? '#c0392b' : pct >= 70 ? '#d68910' : '#2d7a4f';
      return `
        <tr>
          <td style="color:#8a97a8;font-size:12.5px;">${i + 1}</td>
          <td><span class="badge badge-gold">${c.code}</span></td>
          <td><strong>${c.name}</strong></td>
          <td style="font-size:13px;">${c.instructor}</td>
          <td style="font-size:13px;">${c.department}</td>
          <td style="text-align:center;">${c.semester}</td>
          <td style="text-align:center;">${c.creditHours} hrs</td>
          <td>
            <div class="cgpa-bar" style="min-width:90px;">
              <div class="cgpa-track"><div class="cgpa-fill" style="width:${pct}%;background:${barColor}"></div></div>
              <span style="font-size:12px;color:#4a5568;min-width:50px;">${c.enrolledStudents}/${c.maxStudents}</span>
            </div>
          </td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-outline btn-sm" onclick="openEditCourse('${c.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteCourse('${c.id}', '${c.name}')">🗑️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function addCourse() {
    const data = {
      code: document.getElementById('ac-code').value.trim(),
      name: document.getElementById('ac-name').value.trim(),
      instructor: document.getElementById('ac-instructor').value.trim(),
      department: document.getElementById('ac-department').value,
      semester: document.getElementById('ac-semester').value,
      creditHours: document.getElementById('ac-creditHours').value,
      maxStudents: document.getElementById('ac-maxStudents').value,
    };
    if (!data.code || !data.name || !data.instructor) {
      showToast('Code, Name, and Instructor are required', 'error'); return;
    }
    const res = await apiPost('/api/courses', data);
    if (res.success) {
      showToast('Course added!', 'success');
      closeModal('addCourseModal');
      loadCourses();
    } else {
      showToast(res.message || 'Failed', 'error');
    }
  }

  function openEditCourse(id) {
    const c = allCourses.find(c => c.id === id);
    if (!c) return;
    document.getElementById('ec-id').value = c.id;
    document.getElementById('ec-code').value = c.code;
    document.getElementById('ec-name').value = c.name;
    document.getElementById('ec-instructor').value = c.instructor;
    document.getElementById('ec-department').value = c.department;
    document.getElementById('ec-semester').value = c.semester;
    document.getElementById('ec-creditHours').value = c.creditHours;
    document.getElementById('ec-maxStudents').value = c.maxStudents;
    document.getElementById('ec-enrolledStudents').value = c.enrolledStudents;
    openModal('editCourseModal');
  }

  async function saveEditCourse() {
    const id = document.getElementById('ec-id').value;
    const data = {
      code: document.getElementById('ec-code').value.trim(),
      name: document.getElementById('ec-name').value.trim(),
      instructor: document.getElementById('ec-instructor').value.trim(),
      department: document.getElementById('ec-department').value,
      semester: document.getElementById('ec-semester').value,
      creditHours: document.getElementById('ec-creditHours').value,
      maxStudents: document.getElementById('ec-maxStudents').value,
      enrolledStudents: document.getElementById('ec-enrolledStudents').value,
    };
    const res = await apiPut(`/api/courses/${id}`, data);
    if (res.success) {
      showToast('Course updated!', 'success');
      closeModal('editCourseModal');
      loadCourses();
    } else {
      showToast(res.message || 'Update failed', 'error');
    }
  }

  async function deleteCourse(id, name) {
    if (!confirm(`Delete course "${name}"?`)) return;
    const res = await apiDelete(`/api/courses/${id}`);
    if (res.success) {
      showToast(`"${name}" deleted`, 'success');
      loadCourses();
    } else {
      showToast('Delete failed', 'error');
    }
  }

  loadCourses();
</script>
</body>
</html>
