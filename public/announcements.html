<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Student Management System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Announcements</h2>
      <p>University-wide notices and updates</p>
    </div>
    <div class="topbar-right">
      <span class="date-badge" id="liveDate"></span>
      <button class="btn btn-primary" onclick="openModal('addAnnModal')">📢 Post Announcement</button>
    </div>
  </div>

  <div class="page-body">
    <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;">

      <!-- Announcements List -->
      <div>
        <div class="card-header" style="background:var(--white);border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border);border-bottom:none;">
          <h3>All Announcements <span id="annCount" style="font-size:13px;font-weight:400;color:#8a97a8;font-family:'DM Sans',sans-serif;"></span></h3>
          <select class="filter-select" id="priorityFilter" onchange="filterAnnouncements()">
            <option value="">All Priorities</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </div>
        <div id="annList" style="display:flex;flex-direction:column;gap:0;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;">
          <div style="padding:30px;text-align:center;color:#8a97a8;background:var(--white);">Loading announcements…</div>
        </div>
      </div>

      <!-- Post Form Sidebar -->
      <div class="card">
        <div class="card-header"><h3>Quick Post</h3></div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:14px;">
            <div class="form-group">
              <label>Title *</label>
              <input type="text" id="qa-title" placeholder="Announcement title">
            </div>
            <div class="form-group">
              <label>Content *</label>
              <textarea id="qa-content" placeholder="Write your announcement here…" style="min-height:100px;"></textarea>
            </div>
            <div class="form-group">
              <label>Priority</label>
              <select id="qa-priority">
                <option value="Medium">Medium</option>
                <option value="High">High</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <div class="form-group">
              <label>Author</label>
              <input type="text" id="qa-author" placeholder="Your name / department" value="Admin">
            </div>
            <button class="btn btn-primary" onclick="postAnnouncement()" style="width:100%;justify-content:center;">📢 Post</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Post Announcement Modal -->
<div class="modal-overlay" id="addAnnModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Post New Announcement</h3>
      <button class="modal-close" onclick="closeModal('addAnnModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Title *</label>
          <input type="text" id="ann-title" placeholder="Announcement title">
        </div>
        <div class="form-group full-width">
          <label>Content *</label>
          <textarea id="ann-content" placeholder="Full announcement content…"></textarea>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="ann-priority">
            <option>Medium</option>
            <option>High</option>
            <option>Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Author</label>
          <input type="text" id="ann-author" value="Admin" placeholder="Your name">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('addAnnModal')">Cancel</button>
        <button class="btn btn-primary" onclick="postAnnouncementModal()">Post Announcement</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="/js/shared.js"></script>
<script>
  document.getElementById('sidebar').innerHTML = renderSidebar();
  let allAnn = [];

  async function loadAnnouncements() {
    const res = await apiGet('/api/announcements');
    allAnn = res.data;
    renderAnn(allAnn);
  }

  function renderAnn(list) {
    document.getElementById('annCount').textContent = `(${list.length})`;
    const container = document.getElementById('annList');
    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📢</div><h4>No announcements</h4><p>Post one using the form</p></div>`;
      return;
    }
    container.innerHTML = list.map(a => `
      <div style="background:var(--white);padding:20px 22px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;">
          <h4 style="font-size:15px;color:var(--navy);font-weight:600;">${a.title}</h4>
          <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
            <span class="badge badge-${a.priority.toLowerCase()}">${a.priority}</span>
            <button class="btn btn-danger btn-sm" onclick="deleteAnn('${a.id}')">🗑️</button>
          </div>
        </div>
        <p style="font-size:13.5px;color:var(--text-mid);line-height:1.6;margin-bottom:12px;">${a.content}</p>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-light);">
          <span>📅 ${a.date}</span>
          <span>— ${a.author}</span>
        </div>
      </div>
    `).join('');
  }

  function filterAnnouncements() {
    const priority = document.getElementById('priorityFilter').value;
    const filtered = priority ? allAnn.filter(a => a.priority === priority) : allAnn;
    renderAnn(filtered);
  }

  async function postAnnouncement() {
    const data = {
      title: document.getElementById('qa-title').value.trim(),
      content: document.getElementById('qa-content').value.trim(),
      priority: document.getElementById('qa-priority').value,
      author: document.getElementById('qa-author').value.trim() || 'Admin',
    };
    if (!data.title || !data.content) { showToast('Title and content required', 'error'); return; }
    const res = await apiPost('/api/announcements', data);
    if (res.success) {
      showToast('Announcement posted!', 'success');
      document.getElementById('qa-title').value = '';
      document.getElementById('qa-content').value = '';
      loadAnnouncements();
    } else {
      showToast(res.message || 'Failed', 'error');
    }
  }

  async function postAnnouncementModal() {
    const data = {
      title: document.getElementById('ann-title').value.trim(),
      content: document.getElementById('ann-content').value.trim(),
      priority: document.getElementById('ann-priority').value,
      author: document.getElementById('ann-author').value.trim() || 'Admin',
    };
    if (!data.title || !data.content) { showToast('Title and content required', 'error'); return; }
    const res = await apiPost('/api/announcements', data);
    if (res.success) {
      showToast('Announcement posted!', 'success');
      closeModal('addAnnModal');
      loadAnnouncements();
    } else {
      showToast(res.message || 'Failed', 'error');
    }
  }

  async function deleteAnn(id) {
    if (!confirm('Delete this announcement?')) return;
    const res = await apiDelete(`/api/announcements/${id}`);
    if (res.success) {
      showToast('Announcement deleted', 'success');
      loadAnnouncements();
    } else {
      showToast('Delete failed', 'error');
    }
  }

  loadAnnouncements();
</script>
</body>
</html>
